name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC.
    #
    # 7:30 PM America/Chicago (CDT, UTC-5)  => 00:30 UTC next day
    # 7:30 PM America/Chicago (CST, UTC-6)  => 01:30 UTC next day
    #
    # We schedule both and use a guard job to only proceed when the local
    # America/Chicago time matches 19:30.
    - cron: "30 0 * * 2-6" # Tue-Sat UTC => Mon-Fri local
    - cron: "30 1 * * 2-6" # Tue-Sat UTC => Mon-Fri local

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  should-deploy:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.schedule-check.outputs.run }}
    steps:
      - name: Check scheduled deploy time
        id: schedule-check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_hour="$(TZ=America/Chicago date +%H)"
          local_minute="$(TZ=America/Chicago date +%M)"
          if [[ "$local_hour" == "19" && "$local_minute" == "30" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: should-deploy
    if: needs.should-deploy.outputs.run == 'true'
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build static export
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
